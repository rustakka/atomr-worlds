name: release-py

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: build (${{ matrix.target }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, manylinux: 2_28 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, manylinux: 2_28 }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
        # Python 3.10 dropped at the Phase-11 buffer-protocol follow-up:
        # `Py_bf_getbuffer` / `Py_bf_releasebuffer` only enter the limited
        # API at 3.11, and those slots back the zero-copy `numpy.asarray`
        # path on `PyBrick`. 3.10 reaches EOL October 2026.
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist --interpreter python${{ matrix.python }} -m crates/atomr-worlds-py/Cargo.toml
          manylinux: ${{ matrix.manylinux || 'auto' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-py${{ matrix.python }}
          path: dist/

  publish:
    name: publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/py-v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
