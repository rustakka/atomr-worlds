# Cardinal direction loading/unloading verification.
#
# Stops at the same physical world position (8,28,8) and captures
# yaws 0/90/180/270 — same loaded ring, four different slices. With
# symmetric streaming, the terrain density at each LOD distance band
# should be visually consistent across the four shots (the *content*
# at each yaw differs because the FBM terrain is direction-aware, but
# the *amount of loaded brick mass* at each radius should match).
#
# Then walks +Z 30m and back, +X 30m and back, etc., capturing a
# "look back" shot in each. Symmetric streaming + hysteresis means
# the trail behind the camera should despawn uniformly regardless
# of direction.

seed = "0xDEADBEEFCAFEF00D"
mode = "fp"
width = 1280
height = 720
warmup_frames = 240
output_prefix = "cardinal_verify"

[[events]]
frame = 0
kind  = "set_time_of_day"
hours = 12.0

# ----- 4 yaws at the same position -----
