# Companion to `lod_crossfade.toml` — same camera path but with the
# historical `MaskedShells` coverage policy active so the LOD pops
# show up in the captured frames. The two scenarios are meant to be
# stepped through side-by-side: `lod_crossfade_*` is smooth, this one
# isn't.

seed = "0xDEADBEEFCAFEF00D"
mode = "fp"
width = 1280
height = 720
warmup_frames = 240
output_prefix = "lod_crossfade_legacy"

[[events]]
frame = 0
kind  = "set_time_of_day"
hours = 12.0

[[events]]
frame = 0
kind     = "set_strategy"
slot     = "coverage"
strategy = "MaskedShells"

[[events]]
frame = 5
kind  = "key_press"
key   = "ShiftLeft"
[[events]]
frame = 5
kind  = "key_press"
key   = "Space"
[[events]]
frame = 405
kind  = "key_release"
key   = "Space"
[[events]]
frame = 405
kind  = "key_release"
key   = "ShiftLeft"

[[events]]
